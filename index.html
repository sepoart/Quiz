<!DOCTYPE html>
<html>
<head>
  <title>Quiz by Louay</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 100px;
    }
    h1 {
      font-size: 40px;
    }
    button {
      font-size: 20px;
      padding: 15px 30px;
      margin: 20px;
      cursor: pointer;
      color: white;
      border: none;
    }
    .green {
      background-color: green;
    }
    .red {
      background-color: red;
    }
  </style>
</head>
<body>

  <h1>pick green</h1>

  <button class="green" onclick="page()">red</button>
  <button class="red" onclick="page()">green</button>

  <script>
    function page() {
      const w = window.open();
      w.document.write(`
        <html>
          <head>
            <title>dumbass</title>
            <style>
              body {
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                font-family: Arial;
                font-size: 80px;
              }
            </style>
          </head>
          <body>
            dumbass
          </body>
        </html>
      `);
      w.document.close();
    }
  </script>

</body>
</html>
